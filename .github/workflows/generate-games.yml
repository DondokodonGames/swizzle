name: Auto Game Generation

on:
  schedule:
    # 毎時0分に実行（UTC）= 日本時間 毎時9分
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      count:
        description: '生成するゲーム数'
        default: '3'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: シークレットマスキング
        run: |
          echo "::add-mask::${{ secrets.ANTHROPIC_API_KEY }}"
          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"
          echo "::add-mask::${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          echo "::add-mask::${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo "::add-mask::${{ secrets.SUPABASE_MASTER_USER_ID }}"

      - name: ゲーム自動生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MASTER_USER_ID: ${{ secrets.SUPABASE_MASTER_USER_ID }}
          LLM_PROVIDER: anthropic
          SKIP_UPLOAD: false
        run: |
          COUNT=${{ github.event.inputs.count || '3' }}
          npm run ai:neta -- $COUNT

      - name: 進捗ファイルをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/ai/v2/neta-progress.json
          git diff --staged --quiet || git commit -m "chore: auto-generated games [skip ci]"
          git push
