<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swizzle Bridge — 案A NEO-ARCADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --primary:#00E5FF; --secondary:#7C3AED; --accent:#FFB800;
    --bg:#0A0A12; --surface:#14141F; --border:#26263a;
    --text:#ECECF5; --muted:#8A8AA0; --danger:#FF4D6D; --success:#2DD4A7;
    --glow:0 0 24px rgba(0,229,255,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#050509;font-family:'Inter',sans-serif;padding:20px;
  }
  /* 390px phone frame */
  .phone{
    position:relative;width:390px;height:844px;max-width:100%;
    border-radius:38px;overflow:hidden;background:var(--bg);color:var(--text);
    box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 8px #15151f;display:flex;flex-direction:column;
  }
  /* atmosphere layers */
  .bgwrap{position:absolute;inset:0;background:
    radial-gradient(120% 70% at 50% 12%, rgba(124,58,237,.45), transparent 55%),
    linear-gradient(180deg,#12102a 0%, #0A0A12 60%, #050509 100%);}
  .scan{position:absolute;inset:0;pointer-events:none;mix-blend-mode:overlay;
    background:repeating-linear-gradient(rgba(0,0,0,.20) 0 1px, transparent 1px 3px);}
  .vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 80% at 50% 30%, transparent 52%, #000 128%);}
  .content{position:relative;flex:1;overflow-y:auto;padding:22px 20px 168px;}

  .badge{display:inline-flex;align-items:center;gap:6px;font-family:'Chakra Petch';
    font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--primary);border:1px solid rgba(0,229,255,.35);padding:5px 12px;border-radius:999px;
    background:rgba(0,229,255,.06);box-shadow:var(--glow);}

  .result{text-align:center;margin:26px 0 10px}
  .result .ring{width:96px;height:96px;margin:0 auto 14px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:52px;
    background:radial-gradient(circle at 50% 35%, rgba(45,212,167,.25), transparent 70%);
    border:2px solid rgba(45,212,167,.5);box-shadow:0 0 30px rgba(45,212,167,.35);}
  .result h1{font-family:'Chakra Petch';font-weight:700;font-size:22px;letter-spacing:1px}

  .score{margin:18px auto 4px;max-width:300px;text-align:center;
    border:1px solid var(--border);border-radius:18px;padding:16px;
    background:linear-gradient(180deg, rgba(255,184,0,.06), rgba(20,20,31,.6));}
  .score .label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
  .score .num{font-family:'Orbitron';font-weight:800;font-size:46px;line-height:1;
    color:var(--accent);font-variant-numeric:tabular-nums;text-shadow:0 0 22px rgba(255,184,0,.4);margin-top:4px}
  .score .best{display:inline-block;margin-top:8px;font-family:'Chakra Petch';font-weight:600;
    font-size:10px;letter-spacing:2px;color:#0A0A12;background:var(--accent);padding:3px 10px;border-radius:6px}

  .author{display:flex;align-items:center;gap:12px;margin:22px 0 14px;padding:14px;
    border:1px solid var(--border);border-radius:18px;background:rgba(20,20,31,.6);backdrop-filter:blur(6px)}
  .avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-family:'Chakra Petch';font-weight:700;font-size:20px;color:#fff;
    background:linear-gradient(135deg,var(--secondary),var(--primary));box-shadow:0 0 16px rgba(124,58,237,.5)}
  .author .meta{flex:1;min-width:0}
  .author .name{font-weight:600;font-size:15px}
  .author .title{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .like{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;
    border:1px solid rgba(255,77,109,.45);border-radius:14px;padding:8px 12px;background:rgba(255,77,109,.08);cursor:pointer}
  .like .heart{font-size:18px}
  .like .cnt{font-family:'Orbitron';font-weight:700;font-size:13px;color:var(--danger);font-variant-numeric:tabular-nums}

  .ad{margin-top:6px;border:1px dashed var(--border);border-radius:14px;height:84px;
    display:flex;align-items:center;justify-content:center;color:var(--muted);
    font-size:11px;letter-spacing:2px;text-transform:uppercase;background:rgba(255,255,255,.02)}

  /* bottom action bar */
  .actions{position:absolute;left:0;right:0;bottom:0;padding:18px 16px 22px;
    background:linear-gradient(0deg,#050509 30%, rgba(5,5,9,.85) 70%, transparent);}
  .next-strip{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 12px;
    border:1px solid var(--primary);border-radius:14px;background:rgba(0,229,255,.06);box-shadow:var(--glow)}
  .next-strip .thumb{width:40px;height:40px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,#7C3AED,#00E5FF);display:flex;align-items:center;justify-content:center;font-size:20px}
  .next-strip .nx{flex:1;min-width:0}
  .next-strip .nx small{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--primary)}
  .next-strip .nx p{font-family:'Chakra Petch';font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .next-strip .go{font-family:'Orbitron';font-weight:700;font-size:11px;color:var(--bg);background:var(--primary);padding:7px 12px;border-radius:9px}
  .btnrow{display:flex;gap:8px}
  .btn{flex:1;border:none;border-radius:13px;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:3px;
    cursor:pointer;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Chakra Petch';font-weight:600}
  .btn .ic{font-size:20px}.btn .lb{font-size:10px;letter-spacing:1px}
  .btn.primary{background:linear-gradient(135deg,rgba(0,229,255,.18),rgba(124,58,237,.18));border-color:var(--primary);box-shadow:var(--glow)}

  /* time bar */
  .timebar{position:absolute;left:0;right:0;bottom:0;height:5px;background:rgba(255,255,255,.06)}
  .timebar i{display:block;height:100%;width:64%;background:linear-gradient(90deg,var(--success),var(--primary));box-shadow:var(--glow)}
  .content::-webkit-scrollbar{width:0}

  @media (max-width:430px){ body{padding:0} .phone{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none} }
</style>
</head>
<body>
  <div class="phone">
    <div class="bgwrap"></div>
    <div class="content">
      <div style="text-align:center"><span class="badge">◆ Game 03 / 12 cleared</span></div>

      <div class="result">
        <div class="ring">😎</div>
        <h1>CLEARED</h1>
      </div>

      <div class="score">
        <div class="label">Score</div>
        <div class="num">1,240</div>
        <span class="best">★ NEW BEST</span>
      </div>

      <div class="author">
        <div class="avatar">K</div>
        <div class="meta">
          <div class="name">Kenji_Arcade</div>
          <div class="title">Neon Dodge: Hyperdrive</div>
        </div>
        <div class="like">
          <span class="heart">❤️</span>
          <span class="cnt">2.4k</span>
        </div>
      </div>

      <div class="ad">Sponsored</div>
    </div>

    <div class="actions">
      <div class="next-strip">
        <div class="thumb">🛸</div>
        <div class="nx"><small>Up Next</small><p>Star Catcher</p></div>
        <span class="go">PLAY ▶</span>
      </div>
      <div class="btnrow">
        <button class="btn"><span class="ic">📋</span><span class="lb">COPY</span></button>
        <button class="btn primary"><span class="ic">🎮</span><span class="lb">NEXT</span></button>
        <button class="btn"><span class="ic">🔄</span><span class="lb">AGAIN</span></button>
        <button class="btn"><span class="ic">🔗</span><span class="lb">SHARE</span></button>
      </div>
    </div>
    <div class="timebar"><i></i></div>
    <div class="scan"></div>
    <div class="vignette"></div>
  </div>
</body>
</html>
