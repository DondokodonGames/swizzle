<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swizzle Bridge — 案C GALLERY</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800;9..144,900&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --accent:#FF3B1F; --ink:#111111; --bg:#FAFAF7; --surface:#FFFFFF;
    --text:#111111; --muted:#6B6B6B; --line:#E6E6E0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#DEDED7;font-family:'Inter',sans-serif;padding:20px}
  .phone{position:relative;width:390px;height:844px;max-width:100%;border-radius:30px;overflow:hidden;
    background:var(--bg);color:var(--text);box-shadow:0 30px 80px rgba(0,0,0,.25),0 0 0 1px var(--line);display:flex;flex-direction:column}
  .content{position:relative;flex:1;overflow-y:auto;padding:26px 24px 168px}

  /* top meta rule */
  .topmeta{display:flex;justify-content:space-between;align-items:baseline;
    padding-bottom:12px;border-bottom:1px solid var(--ink);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .topmeta b{color:var(--ink);font-weight:600}
  .topmeta .idx{font-family:'Space Grotesk';font-weight:600;color:var(--ink)}

  .result{margin:30px 0 8px}
  .result .kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:600}
  .result h1{font-family:'Fraunces';font-weight:900;font-size:44px;line-height:1.02;letter-spacing:-1px;margin-top:6px}
  .result h1 em{font-style:italic;color:var(--accent)}

  .score{display:flex;align-items:flex-end;justify-content:space-between;margin:26px 0;padding:18px 0;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .score .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .score .num{font-family:'Space Grotesk';font-weight:700;font-size:64px;line-height:.9;letter-spacing:-2px;font-variant-numeric:tabular-nums}
  .score .best{font-family:'Space Grotesk';font-weight:600;font-size:12px;color:var(--accent);border:1px solid var(--accent);padding:4px 8px;letter-spacing:1px}

  .author{display:flex;align-items:center;gap:14px;margin:24px 0}
  .avatar{width:46px;height:46px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces';font-weight:800;font-size:20px;color:var(--bg);background:var(--ink)}
  .author .meta{flex:1;min-width:0}
  .author .by{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .author .name{font-family:'Fraunces';font-weight:600;font-size:19px;line-height:1.1}
  .author .title{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .like{display:flex;align-items:center;gap:7px;flex-shrink:0;cursor:pointer;background:none;
    border:1px solid var(--ink);border-radius:999px;padding:8px 14px;color:var(--ink);font-family:'Space Grotesk';font-weight:600;font-size:13px}
  .like.on{background:var(--accent);border-color:var(--accent);color:#fff}

  .ad{margin-top:8px;height:80px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:10px;letter-spacing:3px;text-transform:uppercase}

  .actions{position:absolute;left:0;right:0;bottom:0;padding:16px 24px 24px;background:var(--bg);border-top:1px solid var(--ink)}
  .next-strip{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .next-strip .thumb{width:44px;height:44px;flex-shrink:0;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px}
  .next-strip .nx{flex:1;min-width:0}
  .next-strip .nx small{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .next-strip .nx p{font-family:'Fraunces';font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .next-strip .go{font-family:'Space Grotesk';font-weight:700;font-size:13px;color:var(--accent)}
  .btnrow{display:flex;gap:0;border:1px solid var(--ink)}
  .btn{flex:1;border:none;border-right:1px solid var(--ink);background:none;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:3px;
    cursor:pointer;color:var(--ink);font-family:'Space Grotesk';font-weight:600}
  .btn:last-child{border-right:none}
  .btn .ic{font-size:18px}.btn .lb{font-size:10px;letter-spacing:1px;text-transform:uppercase}
  .btn.primary{background:var(--accent);color:#fff}

  .timebar{position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--line)}
  .timebar i{display:block;height:100%;width:64%;background:var(--accent)}
  .content::-webkit-scrollbar{width:0}
  @media (max-width:430px){ body{padding:0} .phone{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none} }
</style>
</head>
<body>
  <div class="phone">
    <div class="content">
      <div class="topmeta">
        <span><b>SWIZZLE</b> — Now Playing</span>
        <span class="idx">03 / 12</span>
      </div>

      <div class="result">
        <div class="kicker">Cleared</div>
        <h1>Well<br><em>played.</em></h1>
      </div>

      <div class="score">
        <div>
          <div class="lbl">Score</div>
          <div class="num">1,240</div>
        </div>
        <span class="best">NEW BEST</span>
      </div>

      <div class="author">
        <div class="avatar">A</div>
        <div class="meta">
          <div class="by">Created by</div>
          <div class="name">Aoi Tanaka</div>
          <div class="title">Tilt &amp; Balance — No.07</div>
        </div>
        <button class="like on">♥ 2.4k</button>
      </div>

      <div class="ad">Sponsored</div>
    </div>

    <div class="actions">
      <div class="next-strip">
        <div class="thumb">◆</div>
        <div class="nx"><small>Up Next</small><p>Negative Space</p></div>
        <span class="go">PLAY →</span>
      </div>
      <div class="btnrow">
        <button class="btn"><span class="ic">⎘</span><span class="lb">Copy</span></button>
        <button class="btn primary"><span class="ic">▶</span><span class="lb">Next</span></button>
        <button class="btn"><span class="ic">↻</span><span class="lb">Again</span></button>
        <button class="btn"><span class="ic">↗</span><span class="lb">Share</span></button>
      </div>
    </div>
    <div class="timebar"><i></i></div>
  </div>
</body>
</html>
